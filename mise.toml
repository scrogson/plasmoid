[env]
_.path = ["./target/debug"]

[tools]
rust = "stable"
"cargo:cargo-component" = "latest"
"cargo:wasm-tools" = "latest"

[tasks.build]
description = "Build plasmoid"
run = "cargo build"

[tasks."build:release"]
description = "Build plasmoid (release)"
run = "cargo build --release"

[tasks."build:echo"]
description = "Build the echo WASM component"
dir = "components/echo"
run = """
cargo component build --release
cp target/wasm32-wasip1/release/echo.wasm ../../target/debug/
"""

[tasks."build:ring"]
description = "Build the ring WASM component"
dir = "components/ring"
run = """
cargo component build --release
cp target/wasm32-wasip1/release/ring.wasm ../../target/debug/
"""

[tasks."build:components"]
description = "Build all WASM components"
depends = ["build:echo", "build:ring"]

[tasks."build:all"]
description = "Build plasmoid and all components"
depends = ["build", "build:components"]

[tasks.run]
description = "Start a plasmoid node, loading all components from target/debug"
depends = ["build:all"]
run = "plasmoid start --load-path target/debug"

[tasks."node:a"]
description = "Start node A with echo component"
depends = ["build:all"]
run = """
plasmoid start --data-dir ~/.config/plasmoid/node-a --load-path target/debug \
  --spawn echo --name echo
"""

[tasks."ring:node"]
description = "Start a node with the ring component"
depends = ["build", "build:ring"]
run = """
plasmoid start target/debug/ring.wasm --spawn ring --name ring-bench
"""

[tasks."ring:run"]
description = "Run the ring benchmark (usage: mise run ring:run -- <processes> <messages>)"
run = """
#!/usr/bin/env bash
N="${1:-100}"
M="${2:-100}"
NODE_ID=$(cat ~/.config/plasmoid/node_id)
PLASMOID_NODE="$NODE_ID" plasmoid call ring-bench run "$N" "$M"
"""
