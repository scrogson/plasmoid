[env]
_.path = ["./target/debug"]

[tools]
rust = "stable"
"cargo:cargo-component" = "latest"
"cargo:wasm-tools" = "latest"

[tasks.build]
description = "Build plasmoid"
run = "cargo build"

[tasks."build:release"]
description = "Build plasmoid (release)"
run = "cargo build --release"

[tasks."build:echo"]
description = "Build the echo WASM component"
dir = "components/echo"
run = """
cargo component build --release
cp target/wasm32-wasip1/release/echo_actor.wasm ../../target/debug/
"""

[tasks."build:caller"]
description = "Build the caller WASM component"
dir = "components/caller"
run = """
cargo component build --release
cp target/wasm32-wasip1/release/caller_actor.wasm ../../target/debug/
"""

[tasks."build:components"]
description = "Build all WASM components"
depends = ["build:echo", "build:caller"]

[tasks."build:all"]
description = "Build plasmoid and all components"
depends = ["build", "build:components"]

[tasks.run]
description = "Start a plasmoid node, loading all components from target/debug"
depends = ["build:all"]
run = "plasmoid start --load-path target/debug"

[tasks."node:a"]
description = "Start node A with echo component"
depends = ["build:all"]
run = """
plasmoid start --data-dir ~/.config/plasmoid/node-a --load-path target/debug \
  --spawn echo_actor --name echo
"""

[tasks."node:b"]
description = "Start node B with caller component, peered to node A"
depends = ["build:all"]
run = """
plasmoid start --data-dir ~/.config/plasmoid/node-b --load-path target/debug \
  --peer $(cat ~/.config/plasmoid/node-a/node_id) \
  --spawn caller_actor --name caller
"""
